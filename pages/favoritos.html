<!doctype html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filmio | Favoritos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg fixed-top filmio-navbar">
      <div class="container">
        <a class="navbar-brand brand-mark" href="index.html">
          <img src="../img/filmio_no_bg.webp" alt="Filmio" />
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav ms-lg-4 me-auto">
            <li class="nav-item"><a class="nav-link" href="index.html">Catalogo</a></li>
            <li class="nav-item"><a class="nav-link active" href="favoritos.html">Favoritos</a></li>
          </ul>
          <form class="search-form my-3 my-lg-0" role="search">
            <i class="bi bi-search"></i>
            <input class="form-control" type="search" placeholder="Filtrar favoritos..." />
          </form>
          <a class="btn btn-outline-light ms-lg-3 mt-3 mt-lg-0" href="login.html">Entrar</a>
        </div>
      </div>
    </nav>

    <main class="page-shell">
      <section class="container">
        <div class="section-heading border-bottom border-secondary-subtle pb-4">
          <div>
            <p class="eyebrow">Minha lista</p>
            <h1>Meus favoritos</h1>
            <p class="text-secondary mb-0">Filmes salvos para assistir mais tarde ou revisitar.</p>
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-dark btn-sm" type="button">
              <i class="bi bi-sort-alpha-down"></i>
              Titulo
            </button>
            <button class="btn btn-dark btn-sm" type="button">
              <i class="bi bi-star"></i>
              Nota
            </button>
          </div>
        </div>
        <div class="row g-4 mt-2">
          <div class="col-6 col-md-4 col-lg-3 col-xl-2">
            <article class="movie-card">
              <a class="text-decoration-none" href="detalhes.html">
                <div class="movie-poster mb-3">
                  <img src="https://image.tmdb.org/t/p/w780/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg" alt="Poster de Clube da Luta" />
                  <span class="rating-badge"><i class="bi bi-star-fill text-warning"></i>8.4</span>
                  <span class="favorite-action is-active"><i class="bi bi-heart-fill"></i></span>
                </div>
                <h3 class="movie-card-title text-truncate">Clube da Luta</h3>
                <p class="movie-meta mb-0">Drama - 1999</p>
              </a>
            </article>
          </div>
          <div class="col-6 col-md-4 col-lg-3 col-xl-2">
            <article class="movie-card">
              <a class="text-decoration-none" href="detalhes.html">
                <div class="movie-poster mb-3">
                  <img src="https://image.tmdb.org/t/p/w780/qJ2tW6WMUDux911r6m7haRef0WH.jpg" alt="Poster de Batman" />
                  <span class="rating-badge"><i class="bi bi-star-fill text-warning"></i>8.5</span>
                  <span class="favorite-action is-active"><i class="bi bi-heart-fill"></i></span>
                </div>
                <h3 class="movie-card-title text-truncate">Batman: O Cavaleiro das Trevas</h3>
                <p class="movie-meta mb-0">Acao - 2008</p>
              </a>
            </article>
          </div>
          <div class="col-6 col-md-4 col-lg-3 col-xl-2">
            <article class="movie-card">
              <a class="text-decoration-none" href="detalhes.html">
                <div class="movie-poster mb-3">
                  <img src="https://image.tmdb.org/t/p/w780/7IiTTgloJzvGI1TAYymCfbfl3vT.jpg" alt="Poster de Parasita" />
                  <span class="rating-badge"><i class="bi bi-star-fill text-warning"></i>8.5</span>
                  <span class="favorite-action is-active"><i class="bi bi-heart-fill"></i></span>
                </div>
                <h3 class="movie-card-title text-truncate">Parasita</h3>
                <p class="movie-meta mb-0">Suspense - 2019</p>
              </a>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer class="filmio-footer">
      <div class="container d-flex flex-column flex-md-row justify-content-between gap-3">
        <strong class="brand-mark footer-brand">
          <img src="../img/filmio_no_bg.webp" alt="Filmio" />
        </strong>
        <span>Sua curadoria pessoal.</span>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/app.js"></script>
  </body>
</html>
