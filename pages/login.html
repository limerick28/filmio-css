<!doctype html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Filmio | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Epilogue:wght@600;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/style.css" />
  </head>
  <body class="auth-body">
    <main class="auth-shell min-vh-100 mx-auto px-3 py-5 d-flex flex-column justify-content-center align-items-center">
      <a class="brand-mark auth-brand text-decoration-none mb-4" href="index.html">
        <img src="../img/filmio_no_bg.webp" alt="Filmio" />
      </a>
      <section class="auth-card w-100 shadow-lg">
        <p class="eyebrow text-center">Acesso ao acervo</p>
        <h1 class="h3 text-center mb-4">Entrar na conta</h1>
        <form class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label" for="email">E-mail</label>
            <input class="form-control form-control-lg" id="email" type="email" required placeholder="nome@exemplo.com" />
            <div class="invalid-feedback">Informe um e-mail valido.</div>
          </div>
          <div class="mb-4">
            <label class="form-label" for="senha">Senha</label>
            <input class="form-control form-control-lg" id="senha" type="password" required minlength="6" placeholder="******" />
            <div class="invalid-feedback">A senha deve ter pelo menos 6 caracteres.</div>
          </div>
          <button class="btn btn-primary btn-lg w-100" type="submit">Entrar</button>
          <p class="text-center text-secondary mt-4 mb-0">
            Nao tem conta?
            <a href="cadastro.html">Criar conta</a>
          </p>
        </form>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
