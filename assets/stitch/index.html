<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filmio</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="/assets/css/style.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg custom-navbar navbar-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <img src="/img/filmio_no_bg.png" alt="" class="logo" />
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <form
            class="d-flex mx-auto"
            role="search"
            style="max-width: 500px; width: 100%"
          >
            <input
              class="form-control glass-input me-2 rounded-pill px-4"
              type="search"
              placeholder="Busque filmes, séries..."
              aria-label="Search"
            />
          </form>
          <ul class="navbar-nav mb-2 mb-lg-0 align-items-center">
            <li class="nav-item">
              <a class="nav-link active" href="index.html">Catálogo</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="favoritos.html">Favoritos</a>
            </li>
            <li class="nav-item ms-lg-3 mt-3 mt-lg-0">
              <a class="btn btn-primary-glow w-100" href="login.html">Entrar</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="content-wrapper container">
      <div class="d-flex justify-content-between align-items-end mb-4 mt-4">
        <div>
          <h2 class="h1 fw-bold brand-font text-white mb-0">Em Destaque</h2>
          <p class="text-white-50 mb-0 mt-1">
            Os filmes mais aclamados do momento
          </p>
        </div>
      </div>

      <div class="row g-4 pb-5">
        <!-- Movie 1 -->
        <div class="col-6 col-md-3 col-lg-2">
          <a href="detalhes.html" class="text-decoration-none">
            <div class="card movie-card h-100">
              <img
                src="https://image.tmdb.org/t/p/w500/8cdWjvZQUExUUTzyp4t6EDMubfO.jpg"
                class="card-img-top movie-poster"
                alt="Deadpool & Wolverine"
              />
              <div class="movie-info">
                <span class="movie-title">Deadpool & Wolverine</span>
                <span class="badge bg-warning text-dark"
                  ><i class="bi bi-star-fill"></i> 8.4</span
                >
              </div>
            </div>
          </a>
        </div>

        <!-- Movie 2 -->
        <div class="col-6 col-md-3 col-lg-2">
          <a href="detalhes.html" class="text-decoration-none">
            <div class="card movie-card h-100">
              <img
                src="https://image.tmdb.org/t/p/w500/A1cswODCQpgEQHvcXyI3YwGudM.jpg"
                class="card-img-top movie-poster"
                alt="Oppenheimer"
              />
              <div class="movie-info">
                <span class="movie-title">Oppenheimer</span>
                <span class="badge bg-warning text-dark">8.1</span>
              </div>
            </div>
          </a>
        </div>

        <!-- Movie 3 -->
        <div class="col-6 col-md-3 col-lg-2">
          <a href="detalhes.html" class="text-decoration-none">
            <div class="card movie-card h-100">
              <img
                src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg"
                class="card-img-top movie-poster"
                alt="The Dark Knight"
              />
              <div class="movie-info">
                <span class="movie-title">O Cavaleiro das Trevas</span>
                <span class="badge bg-warning text-dark">9.0</span>
              </div>
            </div>
          </a>
        </div>

        <!-- Movie 4 -->
        <div class="col-6 col-md-3 col-lg-2">
          <a href="detalhes.html" class="text-decoration-none">
            <div class="card movie-card h-100">
              <img
                src="https://image.tmdb.org/t/p/w500/pB8BM7pdSp6B6Ih7QZ4DrQ3PmJK.jpg"
                class="card-img-top movie-poster"
                alt="Clube da Luta"
              />
              <div class="movie-info">
                <span class="movie-title">Clube da Luta</span>
                <span class="badge bg-warning text-dark">8.8</span>
              </div>
            </div>
          </a>
        </div>
      </div>
    </main>

    <footer class="footer mt-auto">
      <div class="container">
        <p class="mb-0">&copy; 2026 Filmio. O Catálogo Premium de Cinema.</p>
      </div>
    </footer>

</html>
